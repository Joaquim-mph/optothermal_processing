# Encapsulated device characteristics
# ====================================
#
# Per-chip physical characteristics, indexed by chip_number. Used by
# analysis/plotting commands (e.g. `biotite compare-first-ivg`) to label
# devices by their material stack and to estimate gate capacitance.
#
# Stack convention: graphene channel is sandwiched between a top hBN
# encapsulant and a bottom dielectric (either hBN or biotite). The
# `material` field refers to the *bottom* dielectric (the one that varies
# between devices); the top is always hBN.
#
# Per-chip fields:
#   material              -- bottom dielectric tag: "hBN" or "biotite"
#   top_hBN_nm            -- top hBN encapsulant thickness (nm)
#   bottom_dielectric_nm  -- bottom dielectric thickness (nm)
#
# Optional/planned:
#   flake_size_um, substrate, notes
#
# Shared material properties (see `materials:` block below) provide the
# dielectric constants used to estimate gate capacitance:
#   C_ox = eps_0 / (t_top/eps_r_top + t_bot/eps_r_bot)
#
# Chips not listed here will be plotted with no material tag (just the chip
# number) and a warning will be emitted.

# ── Channel geometry ──────────────────────────────────────────────────
# Aspect ratio L/W used for mobility estimates (μ ∝ L/W · gm / (C_ox·Vds)).
# Rough placeholder until per-device geometry is measured.
# Per-chip override: add `aspect_ratio_LW: <value>` inside that chip's entry.
#
# `aspect_ratio_LW_range` is a uniform-prior range used by the Monte Carlo
# confidence-band estimator in scripts/estimate_mobility.py.
geometry:
  aspect_ratio_LW: 2.0
  aspect_ratio_LW_range: [2.0, 3.0]

# ── Shared material properties ─────────────────────────────────────────
# Out-of-plane dielectric constants (literature values).
#   hBN: ~3.5 (perpendicular epsilon_r, e.g. Laturia et al., npj 2D Mater. 2018)
#   biotite: ~6.0 (mica-group phyllosilicate, typical out-of-plane value)
materials:
  hBN:
    epsilon_r: 3.5
    epsilon_r_range: [3.0, 4.0]
  biotite:
    epsilon_r: 6.0
    epsilon_r_range: [8, 9]

